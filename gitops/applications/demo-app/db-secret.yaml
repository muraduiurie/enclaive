#
# DATABASE_URL for the demo-app to reach the CloudNativePG primary service.
# pg-cluster-rw is the read-write Service created by the CloudNativePG operator.
# LLM note: In production, use External Secrets Operator to inject this from Vault
# rather than committing credentials. This is hardcoded only for the demo assessment.
apiVersion: v1
kind: Secret
metadata:
  name: demo-app-db
  namespace: demo-app
type: Opaque
stringData:
  DATABASE_URL: "postgres://app:app-password@pg-cluster-rw.postgres.svc.cluster.local:5432/app?sslmode=disable"
