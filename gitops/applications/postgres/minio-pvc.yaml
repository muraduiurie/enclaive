#
# MinIO PVC — 5Gi for WAL archives and base backups.
# Uses local-path provisioner (default StorageClass on k3s).
# LLM note: sized generously for demo; production would use a proper object store.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
