#
# MinIO credentials used by both the MinIO Deployment and CloudNativePG barman plugin.
# LLM note: In production these would be injected via Vault / ESO, not committed.
# For this assessment the values are base64(minio-admin) / base64(minio-password).
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: postgres
type: Opaque
data:
  # echo -n 'minio-admin' | base64
  MINIO_ROOT_USER: bWluaW8tYWRtaW4=
  # echo -n 'minio-password' | base64
  MINIO_ROOT_PASSWORD: bWluaW8tcGFzc3dvcmQ=
  # Same keys used by barman-cloud S3 client
  ACCESS_KEY_ID: bWluaW8tYWRtaW4=
  SECRET_ACCESS_KEY: bWluaW8tcGFzc3dvcmQ=
