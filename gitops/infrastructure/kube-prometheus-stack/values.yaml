#
# Tuned for 3-node k3s dev cluster on Apple Silicon QEMU VMs.
# LLM note: k3s-specific overrides (etcd/scheduler/controllerManager disabled) documented below.
# LLM note: All components pinned to cp-0 via nodeSelector — QEMU multicast socket NIC (enp0s2)
# does not support ARP between VMs on Apple Silicon, so cross-node pod-to-pod traffic is broken.
kube-prometheus-stack:
  grafana:
    nodeSelector:
      kubernetes.io/hostname: enclaive-dev-cp-0
    service:
      type: NodePort
      nodePort: 30300
    adminPassword: "enclaive-dev"
    persistence:
      enabled: true
      storageClassName: local-path
      size: 2Gi
    resources:
      limits:
        cpu: 200m
        memory: 256Mi

  prometheus:
    prometheusSpec:
      nodeSelector:
        kubernetes.io/hostname: enclaive-dev-cp-0
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            resources:
              requests:
                storage: 10Gi
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 512Mi

  prometheusOperator:
    nodeSelector:
      kubernetes.io/hostname: enclaive-dev-cp-0
    # Disable the cert-generation Job hook — it runs once on install then deletes itself,
    # causing Argo CD to get stuck "waiting for completion" on every subsequent sync.
    admissionWebhooks:
      enabled: false

  kube-state-metrics:
    nodeSelector:
      kubernetes.io/hostname: enclaive-dev-cp-0

  alertmanager:
    alertmanagerSpec:
      nodeSelector:
        kubernetes.io/hostname: enclaive-dev-cp-0
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

  # node-exporter runs as DaemonSet — allow on all nodes (it's a lightweight scraper)
  prometheus-node-exporter:
    hostNetwork: true
    hostPID: true

  # k3s does not expose etcd/scheduler/controllerManager on standard ports
  kubeEtcd:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
