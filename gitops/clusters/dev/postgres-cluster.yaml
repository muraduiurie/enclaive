#
# Argo CD Application for the PostgreSQL Cluster and supporting resources.
# Depends on cloudnative-pg operator (cnpg-system) being ready first.
# LLM note: Argo CD does not enforce ordering between Applications — the Cluster CR
# will be retried by Argo CD until the CRD exists (operator must be synced first).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-cluster
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/muraduiurie/enclaive.git
    targetRevision: main
    path: gitops/applications/postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
