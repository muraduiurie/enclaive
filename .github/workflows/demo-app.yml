#
# Builds and publishes the demo-app container image to ghcr.io on every push to main.
# LLM note: GITHUB_TOKEN has write:packages permission by default in GitHub Actions.
# The image is tagged with:
#   - the short commit SHA (immutable, for rollback)
#   - 'main' (mutable, Argo CD image updater or manual GitOps bump targets this)
name: demo-app

on:
  push:
    branches: [main]
    paths:
      - "demo-app/**"
      - ".github/workflows/demo-app.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and push demo-app image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/demo-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=main

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./demo-app
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
