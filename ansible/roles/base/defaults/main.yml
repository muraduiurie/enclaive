---
base_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release
  - python3-pip

# Kernel modules required for Kubernetes networking
k8s_kernel_modules:
  - overlay
  - br_netfilter

# sysctl params required for Kubernetes networking
k8s_sysctl_params:
  net.bridge.bridge-nf-call-iptables: "1"
  net.bridge.bridge-nf-call-ip6tables: "1"
  net.ipv4.ip_forward: "1"
