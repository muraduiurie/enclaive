---
- name: Stop unattended-upgrades before any apt operations
  shell: |
    systemctl stop unattended-upgrades 2>/dev/null || true
    systemctl stop apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
    while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
      sleep 3
    done
  changed_when: false

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name: "{{ base_packages }}"
    state: present

- name: Load kernel modules for Kubernetes
  modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ k8s_kernel_modules }}"

- name: Persist kernel modules across reboots
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: "{{ k8s_kernel_modules | join('\n') }}\n"
    mode: "0644"

- name: Apply sysctl params for Kubernetes networking
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-k8s.conf
    reload: true
  loop: "{{ k8s_sysctl_params | dict2items }}"

- name: Verify bootstrap marker is present
  stat:
    path: /etc/vagrant-bootstrap-marker
  register: marker

- name: Confirm node was provisioned by Terraform
  assert:
    that: marker.stat.exists
    fail_msg: "vagrant-bootstrap-marker not found — node may not have been provisioned correctly"
    success_msg: "Node provisioned correctly by Terraform"
