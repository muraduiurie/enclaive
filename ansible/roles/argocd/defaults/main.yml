---
argocd_namespace: argocd
argocd_helm_release: argocd
argocd_chart_version: "7.8.26"

# NodePort access — reachable from host at https://192.168.56.10:30443
argocd_server_nodeport_http: 30080
argocd_server_nodeport_https: 30443

# GitOps repo — update to the real GitHub URL before pushing
argocd_repo_url: "https://github.com/imuradu/enclaive-platform-challenge.git"
argocd_repo_revision: "main"
argocd_root_app_path: "gitops/clusters/dev"

argocd_kubeconfig: "{{ playbook_dir }}/../kubeconfig/dev.yaml"

# UFW NodePort range to open on all cluster nodes (k3s NodePort range)
argocd_nodeport_range: "30000:32767"
