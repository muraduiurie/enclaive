#
# Installs k3s in server mode on the control-plane node.
# TLS SANs include 10.0.2.2 so workers can validate the cert when joining
# via the QEMU user-mode NAT gateway (host port-forward: host:6443 → cp:6443).
---
# Write k3s server config before install so the installer picks it up.
# LLM note: advertise-address=10.0.2.2 makes the kubernetes Service Endpoint use the QEMU
# SLIRP gateway instead of the cluster NIC (192.168.56.x). This is required because the
# QEMU multicast socket NIC (enp0s2) does not support ARP between VMs on Apple Silicon,
# so pods on workers cannot reach 192.168.56.10:6443 directly. The SLIRP gateway
# (10.0.2.2) routes through the macOS host → cp-0's k8sfwd hostfwd port-forward.
- name: Write k3s server config (advertise-address for QEMU SLIRP networking)
  copy:
    dest: /etc/rancher/k3s/config.yaml
    content: |
      advertise-address: "{{ k3s_api_via_host }}"
    mode: "0644"
  become: true

- name: Install k3s server
  shell: |
    curl -sfL {{ k3s_install_url }} | \
      INSTALL_K3S_VERSION={{ k3s_version }} \
      sh -s - server \
        --node-ip={{ k3s_node_ip }} \
        --tls-san={{ k3s_tls_sans | join(' --tls-san=') }} \
        --disable=traefik \
        --write-kubeconfig-mode=644
  args:
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_SKIP_START: "false"

- name: Wait for k3s API server to be ready
  wait_for:
    host: 127.0.0.1
    port: "{{ k3s_api_port }}"
    timeout: 120

- name: Wait for control-plane node to reach Ready state
  shell: kubectl get nodes --no-headers 2>/dev/null | grep -v ' NotReady' | wc -l
  register: _ready_nodes
  retries: 12
  delay: 10
  until: _ready_nodes.stdout | int >= 1
  changed_when: false

- name: Read k3s join token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: _token_raw

- name: Set k3s token fact (available to worker plays via hostvars)
  set_fact:
    k3s_token: "{{ _token_raw.content | b64decode | trim }}"

# Apple Silicon networking workaround:
# The k8sfwd QEMU NIC (enp0s3) enables hostfwd tcp:0.0.0.0:6443->:6443 so workers
# can reach the k3s API at 10.0.2.2:6443 via the QEMU SLIRP gateway.
# Without this, the NIC is UP but DOWN at the kernel level — SLIRP accepts TCP but
# data can't flow. Policy routing with conntrack marks ensures SYN-ACKs egress via
# enp0s3 (not eth0), resolving the asymmetric routing problem.
# Bring up the k8sfwd NIC (enp0s3) so QEMU hostfwd (host:6443 → cp-0:6443) works.
# dhclient adds a default route via enp0s3; we remove it so pod internet traffic
# exits via eth0 SLIRP instead (enp0s3 SLIRP doesn't route internet replies back).
- name: Bring up k8sfwd NIC (enp0s3) for QEMU hostfwd port 6443
  shell: |
    ip link show enp0s3 | grep -q 'state UP' && exit 0 || true
    ip link set enp0s3 up
    dhclient enp0s3 &
    sleep 3
    # Remove default route that dhclient added on enp0s3 — pod traffic must exit via eth0
    ip route del default dev enp0s3 2>/dev/null || true
  changed_when: false
  args:
    executable: /bin/bash

- name: Disable rp_filter on k8sfwd NIC to allow asymmetric routing
  sysctl:
    name: net.ipv4.conf.enp0s3.rp_filter
    value: "0"
    state: present
    reload: true

- name: Add k8sfwd routing table entry
  shell: grep -q 'k8sfwd' /etc/iproute2/rt_tables || echo '200 k8sfwd' >> /etc/iproute2/rt_tables
  changed_when: false

- name: Add routes in k8sfwd routing table
  shell: |
    ip route show table k8sfwd | grep -q '10.0.2.0' || ip route add 10.0.2.0/24 dev enp0s3 src 10.0.2.15 table k8sfwd
    ip route show table k8sfwd | grep -q 'default' || ip route add default via 10.0.2.2 dev enp0s3 table k8sfwd
  changed_when: false

- name: Add fwmark policy rule for k8sfwd table
  shell: ip rule show | grep -q 'fwmark 0x64' || ip rule add fwmark 100 table k8sfwd pref 100
  changed_when: false

- name: Apply conntrack-based fwmark rules for enp0s3 asymmetric routing
  shell: |
    iptables -t mangle -C PREROUTING -i enp0s3 -j MARK --set-mark 100 2>/dev/null || \
      iptables -t mangle -A PREROUTING -i enp0s3 -j MARK --set-mark 100
    iptables -t mangle -C PREROUTING -j CONNMARK --save-mark 2>/dev/null || \
      iptables -t mangle -A PREROUTING -j CONNMARK --save-mark
    iptables -t mangle -C OUTPUT -j CONNMARK --restore-mark 2>/dev/null || \
      iptables -t mangle -A OUTPUT -j CONNMARK --restore-mark
  changed_when: false

- name: Fetch kubeconfig to local machine
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ k3s_kubeconfig_local }}"
    flat: true

- name: Show cluster status
  shell: kubectl get nodes -o wide
  register: _nodes
  changed_when: false

- name: Print cluster status
  debug:
    msg: "{{ _nodes.stdout_lines }}"
