#
# Installs k3s in agent mode on worker nodes.
# Workers connect to the control-plane via 10.0.2.2:6443 (QEMU NAT host gateway).
# The join token is fetched from the control-plane via hostvars set in Play 3.
---
- name: Set control-plane hostname fact
  set_fact:
    _cp_host: "{{ groups['control_plane'][0] }}"

- name: Verify k3s token is available from control-plane
  assert:
    that: hostvars[_cp_host]['k3s_token'] is defined
    fail_msg: "k3s_token not found in hostvars for {{ _cp_host }} — did the control-plane play succeed?"

- name: Install k3s agent
  shell: |
    curl -sfL {{ k3s_install_url }} | \
      INSTALL_K3S_VERSION={{ k3s_version }} \
      K3S_URL=https://{{ k3s_api_via_host }}:{{ k3s_api_port }} \
      K3S_TOKEN={{ hostvars[_cp_host]['k3s_token'] }} \
      sh -s - agent \
        --node-ip={{ k3s_node_ip }}
  args:
    creates: /usr/local/bin/k3s

- name: Wait for k3s agent to start
  service:
    name: k3s-agent
    state: started
    enabled: true

# Apple Silicon networking workaround:
# k3s server advertises its cluster IP (192.168.56.10) for the remotedialer proxy tunnel.
# Workers can't reach 192.168.56.10 directly (QEMU multicast not supported on macOS).
# DNAT redirects proxy connections to 10.0.2.2:6443 (the QEMU SLIRP gateway), which
# routes via the host to cp-0's k8sfwd hostfwd (host:6443 → cp-0:6443).
- name: Add DNAT rule to redirect cluster-IP proxy connections via QEMU NAT
  iptables:
    table: nat
    chain: OUTPUT
    destination: "{{ hostvars[_cp_host]['k3s_node_ip'] }}"
    protocol: tcp
    destination_port: "{{ k3s_api_port }}"
    jump: DNAT
    to_destination: "{{ k3s_api_via_host }}:{{ k3s_api_port }}"
  when: hostvars[_cp_host]['k3s_node_ip'] is defined

# MASQUERADE pod traffic destined for SLIRP (10.0.2.0/24) so the source IP is
# the node's eth0 IP (10.0.2.15) rather than the pod CIDR (10.42.x.x).
# Without this, SLIRP drops packets from unknown source IPs.
- name: MASQUERADE pod traffic going to QEMU SLIRP gateway
  iptables:
    table: nat
    chain: POSTROUTING
    destination: "10.0.2.0/24"
    jump: MASQUERADE
  become: true

- name: Verify agent process is running
  shell: systemctl is-active k3s-agent
  register: _agent_status
  changed_when: false

- name: Report agent status
  debug:
    msg: "k3s-agent on {{ inventory_hostname }} is {{ _agent_status.stdout }}"
